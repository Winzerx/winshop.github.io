<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinShop — Контакты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <span class="logo">WinShop</span>
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог</a>
    <a href="about.html">О нас</a>
    <a href="contacts.html">Контакты</a>
</nav>

<div class="container">
    <h1>Контакты</h1>

    <div class="info-block">
        <h2>Наши данные</h2>
        <div class="contact-item"><span>Телефон:</span> +7 (495) 987-65-43</div>
        <div class="contact-item"><span>Email:</span> info@winshop.ru</div>
        <div class="contact-item"><span>Москва:</span> ул. Арбат, д. 22</div>
        <div class="contact-item"><span>Екатеринбург:</span> ул. Ленина, д. 55</div>
        <div class="contact-item"><span>Режим работы:</span> Пн–Вс, 10:00 – 21:00</div>
    </div>

    <div class="info-block">
        <h2>Написать нам</h2>

        <label for="name">Имя</label>
        <input type="text" id="name" placeholder="Иван Иванов">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ivan@mail.ru">

        <label for="phone">Телефон</label>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">

        <label for="message">Сообщение</label>
        <textarea id="message" rows="4" placeholder="Ваш вопрос..."></textarea>

        <button>Отправить</button>
    </div>
</div>
</body>
</html>
